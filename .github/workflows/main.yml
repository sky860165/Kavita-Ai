name: Build Signed Kavita AI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Create keystore from secrets (optional)
      - name: Create Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/kavita.keystore

      - name: Install Dependencies
        run: |
          npm install
          cd android && ./gradlew clean

      # Build signed APK if keystore exists
      - name: Build Signed APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/kavita.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # Build unsigned APK if no keystore
      - name: Build Unsigned APK
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kavita-ai-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          name: Kavita AI v${{ github.run_number }}
          body: |
            💕 Kavita AI Mobile App - Release Build

            **Download the APK and install on your Android phone!**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
