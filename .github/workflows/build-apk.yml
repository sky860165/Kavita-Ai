name: Build Kavita AI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Extract ZIP if exists
      - name: Extract ZIP if exists
        run: |
          if [ -f "kavita-ai-expo.zip" ]; then
            echo "Found kavita-ai-expo.zip, extracting..."
            unzip -o kavita-ai-expo.zip
            # Move files from kavita-ai/ folder to root
            if [ -d "kavita-ai" ]; then
              echo "Moving files from kavita-ai/ to root..."
              cp -r kavita-ai/* .
              cp -r kavita-ai/.github . 2>/dev/null || true
              rm -rf kavita-ai kavita-ai-expo.zip
            fi
          fi
          echo "Current directory structure:"
          ls -la

      # Step 3: Check project files
      - name: Check files
        run: |
          echo "=== Checking for package.json ==="
          if [ -f "package.json" ]; then
            echo "✅ package.json found"
            cat package.json
          else
            echo "❌ package.json NOT found"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi

      # Step 4: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 5: Setup EAS (Expo)
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Step 6: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 7: Build APK
      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
