name: Build Kavita AI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Unzip if project is in ZIP (optional)
      - name: Extract ZIP if exists
        run: |
          if [ -f "kavita-ai-expo.zip" ]; then
            unzip -o kavita-ai-expo.zip
            mv kavita-ai-expo/* .
            mv kavita-ai-expo/.* . 2>/dev/null || true
            rm -rf kavita-ai-expo kavita-ai-expo.zip
          fi
        shell: bash

      # Step 3: Check project structure
      - name: Check files
        run: |
          ls -la
          cat package.json || echo "No package.json found"

      # Step 4: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 5: Setup EAS (Expo)
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Step 6: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 7: Build APK
      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
