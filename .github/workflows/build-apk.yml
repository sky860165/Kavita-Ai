name: Build Kavita AI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# 🔥 GLOBAL environment variables - available to ALL steps
env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract ZIP if exists
        run: |
          if [ -f "kavita-ai-expo.zip" ]; then
            unzip -o kavita-ai-expo.zip
            if [ -d "kavita-ai" ]; then
              cp -r kavita-ai/* .
              cp -r kavita-ai/.github . 2>/dev/null || true
              rm -rf kavita-ai kavita-ai-expo.zip
            fi
          fi

      - name: Check files
        run: |
          if [ -f "package.json" ]; then
            echo "✅ package.json found"
          else
            echo "❌ package.json NOT found"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          npm install -g eas-cli

      - name: Verify EAS Token
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "✅ EXPO_TOKEN is set"
          else
            echo "❌ EXPO_TOKEN is NOT set!"
            exit 1
          fi

      - name: Build APK
        run: |
          eas build --platform android --profile preview --non-interactive
